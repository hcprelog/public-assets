name: Post to Instagram

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 9 AM ET (EDT = UTC-4) Mon-Fri
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic openai requests

      - name: Post to Instagram
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python automation/scripts/post_instagram.py

      - name: Commit queue update
        run: |
          git config user.name "H&C Ops Bot"
          git config user.email "ops@hcprelog.com"
          git add automation/scripts/instagram_queue.json
          git diff --staged --quiet || git commit -m "[$(date +%Y-%m-%d)] instagram: post published"
          git push
