name: Refresh Instagram Token

on:
  schedule:
    # Run every 45 days at 8 AM ET (12:00 UTC)
    # Token valid 60 days — refresh at 45 to be safe
    - cron: '0 12 */45 * *'
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pynacl requests

      - name: Refresh Instagram access token
        env:
          INSTAGRAM_APP_ID: ${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python automation/refresh_instagram_token.py
