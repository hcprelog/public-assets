name: Instagram Daily Post

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom post topic (optional)'
        required: false
        default: ''

jobs:
  post-to-instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests pillow

      - name: Generate caption and post to Instagram
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CUSTOM_TOPIC: ${{ github.event.inputs.topic }}
        run: python automation/post_instagram.py
